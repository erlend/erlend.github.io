name: Erlend Codes
description: ""
url: "https://erlend.codes"
email: erlendf@hey.com
image: me-head-idea.png

# Social media
social_media:
  facebook:
  github: erlend
  instagram:
  twitter:
  youtube:

# Webmaster tools
webmaster_verifications: {}
  # google: 1234
  # bing: 1234
  # alexa: 1234
  # yandex: 1234
  # baidu: 1234
  # facebook: 1234

# Default frontmatter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: default

# Remove file ext from urls
permalink: pretty

# Prevent unwanted files to be added to the site
exclude:
  - compose.yml
  - Dockerfile
  - README.md

# Bundle stylesheets with Tailwind CLI
minibundle:
  mode: development
  minifier_commands:
    css: bundle exec tailwindcss --minify --input -
